<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="512" height="512" fill="#0A1020"/>

  <!-- Subtle chess grid -->
  <rect x="0"   y="0"   width="64" height="64" fill="#111828"/>
  <rect x="128" y="0"   width="64" height="64" fill="#111828"/>
  <rect x="256" y="0"   width="64" height="64" fill="#111828"/>
  <rect x="384" y="0"   width="64" height="64" fill="#111828"/>
  <rect x="64"  y="64"  width="64" height="64" fill="#111828"/>
  <rect x="192" y="64"  width="64" height="64" fill="#111828"/>
  <rect x="320" y="64"  width="64" height="64" fill="#111828"/>
  <rect x="448" y="64"  width="64" height="64" fill="#111828"/>
  <rect x="0"   y="128" width="64" height="64" fill="#111828"/>
  <rect x="128" y="128" width="64" height="64" fill="#111828"/>
  <rect x="256" y="128" width="64" height="64" fill="#111828"/>
  <rect x="384" y="128" width="64" height="64" fill="#111828"/>
  <rect x="64"  y="192" width="64" height="64" fill="#111828"/>
  <rect x="192" y="192" width="64" height="64" fill="#111828"/>
  <rect x="320" y="192" width="64" height="64" fill="#111828"/>
  <rect x="448" y="192" width="64" height="64" fill="#111828"/>
  <rect x="0"   y="256" width="64" height="64" fill="#111828"/>
  <rect x="128" y="256" width="64" height="64" fill="#111828"/>
  <rect x="256" y="256" width="64" height="64" fill="#111828"/>
  <rect x="384" y="256" width="64" height="64" fill="#111828"/>
  <rect x="64"  y="320" width="64" height="64" fill="#111828"/>
  <rect x="192" y="320" width="64" height="64" fill="#111828"/>
  <rect x="320" y="320" width="64" height="64" fill="#111828"/>
  <rect x="448" y="320" width="64" height="64" fill="#111828"/>
  <rect x="0"   y="384" width="64" height="64" fill="#111828"/>
  <rect x="128" y="384" width="64" height="64" fill="#111828"/>
  <rect x="256" y="384" width="64" height="64" fill="#111828"/>
  <rect x="384" y="384" width="64" height="64" fill="#111828"/>
  <rect x="64"  y="448" width="64" height="64" fill="#111828"/>
  <rect x="192" y="448" width="64" height="64" fill="#111828"/>
  <rect x="320" y="448" width="64" height="64" fill="#111828"/>
  <rect x="448" y="448" width="64" height="64" fill="#111828"/>

  <!--
    CAVALO (peça preta) — altura 250px
    Centro X=312, base Y=430, topo Y=180
    Base idêntica ao Rei: y=-28, h=28
  -->
  <g transform="translate(312,430)">

    <!-- Contorno/sombra -->
    <rect x="-70" y="-28" width="140" height="28" rx="7" fill="#3D2810"/>
    <rect x="-59" y="-46" width="118" height="20" rx="5" fill="#3D2810"/>

    <!-- Base -->
    <rect x="-66" y="-28" width="132" height="28" rx="7" fill="#1E1209"/>
    <rect x="-55" y="-46" width="110" height="20" rx="5" fill="#1E1209"/>

    <!-- Corpo -->
    <path d="M -46,-46 L 46,-46 L 34,-158 L -34,-158 Z" fill="#1E1209"/>

    <!-- Colar -->
    <rect x="-54" y="-173" width="108" height="18" rx="5" fill="#1E1209"/>

    <!-- Pescoço -->
    <path d="M -30,-173 L 38,-173 L 54,-221 L -14,-221 Z" fill="#1E1209"/>

    <!-- Cabeça -->
    <path d="
      M -14,-221
      L  54,-221
      C  74,-221  86,-206  86,-191
      C  86,-175  74,-165  58,-161
      L  34,-155
      L -54,-173
      L -30,-173
      Z" fill="#1E1209"/>

    <!-- Nuca -->
    <path d="
      M  54,-221
      L  62,-243
      L  78,-249
      L  90,-237
      C  94,-221  90,-201  86,-191
      C  84,-208  74,-221  54,-221
      Z" fill="#1E1209"/>

    <!-- Orelha -->
    <path d="M 62,-243 L 54,-267 L 74,-263 L 78,-249 Z" fill="#2E1E0C"/>

    <!-- Olho -->
    <circle cx="58" cy="-229" r="5" fill="#3D2810"/>
    <circle cx="59" cy="-230" r="2" fill="#6A4820"/>

    <!-- Borda inferior -->
    <path d="M -66,-28 L 66,-28" stroke="#3D2810" stroke-width="1.5" fill="none"/>

  </g>

  <!--
    REI (peça branca) — altura 300px
    Centro X=200, base Y=430, topo Y=130
    Base: y=-28, h=28
  -->
  <g transform="translate(200,430)" fill="#EED5A0">

    <!-- Base -->
    <rect x="-80" y="-28" width="160" height="28" rx="7"/>

    <!-- Plataforma -->
    <rect x="-68" y="-46" width="136" height="20" rx="5"/>

    <!-- Corpo -->
    <path d="M -54,-46 L 54,-46 L 42,-185 L -42,-185 Z"/>

    <!-- Colar -->
    <rect x="-68" y="-200" width="136" height="18" rx="5"/>

    <!-- Pescoço -->
    <rect x="-36" y="-228" width="72" height="30" rx="4"/>

    <!-- Cabeça -->
    <rect x="-44" y="-250" width="88" height="24" rx="7"/>

    <!-- Orbe sob a cruz -->
    <rect x="-22" y="-278" width="44" height="30" rx="14"/>

    <!-- Cruz — haste vertical -->
    <rect x="-7" y="-370" width="14" height="94" rx="4"/>

    <!-- Cruz — barra horizontal -->
    <rect x="-34" y="-348" width="68" height="14" rx="4"/>

    <!-- Sombras internas -->
    <path d="M -54,-46 L -42,-185" stroke="#C8A870" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M  54,-46 L  42,-185" stroke="#C8A870" stroke-width="2" fill="none" opacity="0.5"/>

  </g>

  <!-- Linha de chão compartilhada -->
  <rect x="100" y="432" width="312" height="3" rx="2" fill="#1A2840" opacity="0.9"/>

  <!-- Acento dourado -->
  <rect x="175" y="464" width="162" height="2" rx="1" fill="#D4A843" opacity="0.35"/>

</svg>
